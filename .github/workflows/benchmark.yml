name: Benchmark

on:
  push:
    branches:
      - master
    paths:
      - benchmark/**
      - src/**
      - package.json
      - .github/workflows/benchmark.yml

  workflow_dispatch:

concurrency:
  group: benchmark
  cancel-in-progress: true

jobs:
  benchmark-bun:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install && bun install json5

      - name: Build and run benchmark
        run: |
          bun build benchmark/find.ts --outfile benchmark/find.js --target=node
          bun run benchmark/find.ts benchmark_bun_ts
          bun run benchmark/find.js benchmark_bun_js

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark_bun_ts
          path: benchmark_bun_ts.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark_bun_js
          path: benchmark_bun_js.json

      - name: Upload built benchmark file
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-built-file
          path: benchmark/find.js

  benchmark-node-ubuntu:
    runs-on: ubuntu-latest
    needs: benchmark-bun

    strategy:
      matrix:
        include:
          - node-version: 20
          - node-version: 22
          - node-version: 24

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Download built benchmark file
        uses: actions/download-artifact@v4
        with:
          name: benchmark-built-file
          path: benchmark

      - name: Run benchmark
        run: |
          fileName="benchmark_node_${{ matrix.node-version }}_ubuntu"
          node benchmark/find.js "$fileName"

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark_node_${{ matrix.node-version }}_ubuntu
          path: benchmark_node_${{ matrix.node-version }}_ubuntu.json

  benchmark-node-windows:
    runs-on: windows-latest
    needs: benchmark-bun

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Download built benchmark file
        uses: actions/download-artifact@v4
        with:
          name: benchmark-built-file
          path: benchmark

      - name: Run benchmark
        run: |
          node benchmark/find.js benchmark_node_24_windows

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark_node_24_windows
          path: benchmark_node_24_windows.json

  push-benchmark-results:
    needs: [ benchmark-node-ubuntu, benchmark-node-windows, benchmark-bun ]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Download benchmark results
        uses: actions/download-artifact@v4
        with:
          path: .
          merge-multiple: true

      - name: Commit benchmark results
        run: |
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/wxn0brP/ValtheraDB-storage-dir.git

          git checkout --orphan benchmark
          git add benchmark_*.json
          git commit -m "benchmark results"
          git push origin benchmark --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
